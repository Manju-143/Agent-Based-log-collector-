services:
  pksl-server:
    build: .
    container_name: pksl-server
    environment:
      PKSL_SERVER_HOST: "0.0.0.0"
      PKSL_SERVER_PORT: "9000"
      PKSL_STORAGE_DIR: "/app/data"
      PKSL_LOG_FILE: "verified_logs.jsonl"

      PKSL_AES_KEY: "${PKSL_AES_KEY}"
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data
      - ./pki:/app/pki:ro
      - ./keys:/app/keys:ro

  pksl-agent:
    build: .
    container_name: pksl-agent
    command: ["python", "-m", "agent.agent"]
    environment:
      PKSL_AGENT_ID: "agent-01"
      PKSL_TARGET_HOST: "pksl-server"
      PKSL_TARGET_PORT: "9000"
      PKSL_SEND_INTERVAL_SEC: "2"

      PKSL_AES_KEY: "${PKSL_AES_KEY}"
    depends_on:
      - pksl-server
    volumes:
      - ./pki:/app/pki:ro
      - ./keys:/app/keys:ro

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${OPENSEARCH_INITIAL_ADMIN_PASSWORD}"
    ports:
      - "9200:9200"
      - "9600:9600"